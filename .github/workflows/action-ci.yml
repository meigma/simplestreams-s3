name: Action CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
    paths:
      - action.yml
      - action/**
      - internal/catalog/**
      - internal/cli/publish/**
      - internal/evidence/**
      - internal/publish/**
      - internal/testfixture/**
      - internal/integration/action_process_test.go
      - .github/scripts/update_major_version_tag.sh
      - .github/workflows/action-ci.yml
      - .github/workflows/major-version-tag.yml
      - release-please-config.json
      - internal/integration/action_ci_process_test.go
  push:
    branches:
      - master
    paths:
      - action.yml
      - action/**
      - internal/catalog/**
      - internal/cli/publish/**
      - internal/evidence/**
      - internal/publish/**
      - internal/testfixture/**
      - internal/integration/action_process_test.go
      - .github/scripts/update_major_version_tag.sh
      - .github/workflows/action-ci.yml
      - .github/workflows/major-version-tag.yml
      - release-please-config.json
      - internal/integration/action_ci_process_test.go

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action:
    name: TypeScript and distribution
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    defaults:
      run:
        working-directory: action
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Verify paired repository and CLI version
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          repository_version="$(jq -r '.["."]' .release-please-manifest.json)"
          action_version="$(awk '
            $1 == "version:" { in_version = 1; next }
            in_version && $1 == "default:" { print $2; exit }
          ' action.yml)"
          [[ "$repository_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]
          test "$action_version" = "$repository_version"

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: action/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run action checks
        run: npm run ci

  publish:
    name: Released CLI publish and tool cache
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      AWS_ACCESS_KEY_ID: integration-user
      AWS_SECRET_ACCESS_KEY: integration-password
      AWS_REGION: us-east-1
      AWS_EC2_METADATA_DISABLED: 'true'
      GOTOOLCHAIN: local
      SIMPLESTREAMS_S3_ACTION_WORKFLOW_TEST: '1'
      SIMPLESTREAMS_S3_TEST_S3_ENDPOINT: http://127.0.0.1:9000
      SIMPLESTREAMS_S3_TEST_S3_PATH_STYLE: 'true'
      SIMPLESTREAMS_S3_TEST_UPLOAD_THRESHOLD_BYTES: '1048576'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Start MinIO
        run: |
          set -euo pipefail
          docker run --detach --rm \
            --name simplestreams-s3-action-minio \
            --publish 127.0.0.1:9000:9000 \
            --env MINIO_ROOT_USER="$AWS_ACCESS_KEY_ID" \
            --env MINIO_ROOT_PASSWORD="$AWS_SECRET_ACCESS_KEY" \
            minio/minio@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e \
            server /data
          curl --fail --retry 30 --retry-all-errors --retry-delay 1 \
            http://127.0.0.1:9000/minio/health/live

      - name: Prepare fixture and bucket
        env:
          SIMPLESTREAMS_S3_ACTION_FIXTURE_DIR: ${{ runner.temp }}/action-fixture
        run: >-
          go test -count=1 -tags integration
          -run '^TestPrepareGitHubActionWorkflow$'
          ./internal/integration

      - name: Publish image
        id: first
        uses: ./
        with:
          version: latest
          github-token: ${{ github.token }}
          metadata-path: ${{ runner.temp }}/action-fixture/incus.tar.xz
          disk-path: ${{ runner.temp }}/action-fixture/disk.qcow2
          s3-bucket: private-images
          s3-region: us-east-1
          aliases: |
            alpinelinux/stable
            alpinelinux/latest

      - name: Publish the same image from the tool cache
        id: second
        uses: ./
        with:
          version: ${{ steps.first.outputs.cli-version }}
          github-token: ${{ github.token }}
          metadata-path: ${{ runner.temp }}/action-fixture/incus.tar.xz
          disk-path: ${{ runner.temp }}/action-fixture/disk.qcow2
          s3-bucket: private-images
          s3-region: us-east-1
          aliases: |
            alpinelinux/stable
            alpinelinux/latest

      - name: Verify action outputs and cache reuse
        env:
          FIRST_CLI_PATH: ${{ steps.first.outputs.cli-path }}
          FIRST_CLI_VERSION: ${{ steps.first.outputs.cli-version }}
          FIRST_IMAGE_VERSION: ${{ steps.first.outputs.image-version }}
          FIRST_PRODUCT: ${{ steps.first.outputs.product }}
          SECOND_CLI_PATH: ${{ steps.second.outputs.cli-path }}
          SECOND_CLI_VERSION: ${{ steps.second.outputs.cli-version }}
          SECOND_IMAGE_VERSION: ${{ steps.second.outputs.image-version }}
          SECOND_PRODUCT: ${{ steps.second.outputs.product }}
        run: |
          set -euo pipefail
          [[ "$FIRST_CLI_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]
          test "$FIRST_PRODUCT" = 'alpinelinux:3.22:cloud:arm64'
          test "$FIRST_IMAGE_VERSION" = '202607181302'
          test -x "$FIRST_CLI_PATH"
          test "$SECOND_CLI_PATH" = "$FIRST_CLI_PATH"
          test "$SECOND_CLI_VERSION" = "$FIRST_CLI_VERSION"
          test "$SECOND_PRODUCT" = "$FIRST_PRODUCT"
          test "$SECOND_IMAGE_VERSION" = "$FIRST_IMAGE_VERSION"

      - name: Rehearse public release to major tag resolution
        env:
          DRY_RUN: 'true'
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ steps.first.outputs.cli-version }}
        run: bash .github/scripts/update_major_version_tag.sh "$RELEASE_TAG"

      - name: Verify published catalog
        run: >-
          go test -count=1 -tags integration
          -run '^TestVerifyGitHubActionWorkflow$'
          ./internal/integration

      - name: Show MinIO logs on failure
        if: failure()
        run: docker logs simplestreams-s3-action-minio

      - name: Stop MinIO
        if: always()
        run: docker stop simplestreams-s3-action-minio || true

  real-aws:
    name: Real AWS S3 publish
    if: >-
      ${{
        vars.SIMPLESTREAMS_S3_REAL_AWS_E2E == '1' &&
        (github.event_name == 'workflow_dispatch' ||
          github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      AWS_REGION: us-east-1
      GOTOOLCHAIN: local
      S3_BUCKET: simplestreams-s3-action-${{ github.run_id }}-${{ github.run_attempt }}
      SIMPLESTREAMS_S3_ACTION_WORKFLOW_TEST: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Configure AWS credentials
        id: credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-access-key-id: ${{ secrets.SIMPLESTREAMS_S3_REAL_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SIMPLESTREAMS_S3_REAL_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare fixture and bucket
        id: aws
        env:
          SIMPLESTREAMS_S3_ACTION_FIXTURE_DIR: ${{ runner.temp }}/action-fixture
        run: |
          set -euo pipefail
          go test -count=1 -tags integration \
            -run '^TestPrepareGitHubActionAWSWorkflow$' \
            ./internal/integration
          aws s3api create-bucket --bucket "$S3_BUCKET" --region "$AWS_REGION"
          echo "account=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Publish image to AWS S3
        id: first-aws
        uses: ./
        with:
          version: latest
          github-token: ${{ github.token }}
          metadata-path: ${{ runner.temp }}/action-fixture/incus.tar.xz
          disk-path: ${{ runner.temp }}/action-fixture/disk.qcow2
          s3-bucket: ${{ env.S3_BUCKET }}
          s3-region: ${{ env.AWS_REGION }}
          s3-expected-bucket-owner: ${{ steps.aws.outputs.account }}
          aliases: |
            alpinelinux/stable
            alpinelinux/latest

      - name: Repeat image publication from the tool cache
        id: second-aws
        uses: ./
        with:
          version: ${{ steps.first-aws.outputs.cli-version }}
          github-token: ${{ github.token }}
          metadata-path: ${{ runner.temp }}/action-fixture/incus.tar.xz
          disk-path: ${{ runner.temp }}/action-fixture/disk.qcow2
          s3-bucket: ${{ env.S3_BUCKET }}
          s3-region: ${{ env.AWS_REGION }}
          s3-expected-bucket-owner: ${{ steps.aws.outputs.account }}
          aliases: |
            alpinelinux/stable
            alpinelinux/latest

      - name: Verify AWS outputs and catalog
        env:
          FIRST_CLI_PATH: ${{ steps.first-aws.outputs.cli-path }}
          FIRST_CLI_VERSION: ${{ steps.first-aws.outputs.cli-version }}
          FIRST_IMAGE_VERSION: ${{ steps.first-aws.outputs.image-version }}
          FIRST_PRODUCT: ${{ steps.first-aws.outputs.product }}
          SECOND_CLI_PATH: ${{ steps.second-aws.outputs.cli-path }}
          SECOND_CLI_VERSION: ${{ steps.second-aws.outputs.cli-version }}
          SECOND_IMAGE_VERSION: ${{ steps.second-aws.outputs.image-version }}
          SECOND_PRODUCT: ${{ steps.second-aws.outputs.product }}
        run: |
          set -euo pipefail
          [[ "$FIRST_CLI_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]
          test "$FIRST_PRODUCT" = 'alpinelinux:3.22:cloud:arm64'
          test "$FIRST_IMAGE_VERSION" = '202607181302'
          test -x "$FIRST_CLI_PATH"
          test "$SECOND_CLI_PATH" = "$FIRST_CLI_PATH"
          test "$SECOND_CLI_VERSION" = "$FIRST_CLI_VERSION"
          test "$SECOND_PRODUCT" = "$FIRST_PRODUCT"
          test "$SECOND_IMAGE_VERSION" = "$FIRST_IMAGE_VERSION"
          test "$(aws s3api list-objects-v2 \
            --bucket "$S3_BUCKET" \
            --query 'length(Contents)' \
            --output text)" = '4'
          aws s3api head-object \
            --bucket "$S3_BUCKET" \
            --key streams/v1/index.json >/dev/null

      - name: Delete AWS test bucket
        if: ${{ always() && steps.credentials.outcome == 'success' }}
        run: |
          set -euo pipefail
          if aws s3api head-bucket --bucket "$S3_BUCKET" 2>/dev/null; then
            aws s3 rm "s3://$S3_BUCKET" --recursive
            aws s3api delete-bucket --bucket "$S3_BUCKET"
          fi
