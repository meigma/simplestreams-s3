name: CI

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Never auto-download a Go toolchain other than the mise-pinned one
      # (mise [env] is not carried by the action's shims, so set it on the job).
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true
          # Installs every tool from mise.toml honoring mise.lock (locked → fail
          # closed), including moon, and prepends the shim dir to PATH.

      - name: Resolve uv cache directory
        id: uv-cache
        run: echo "dir=$(uv cache dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-mod-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mod-

      - name: Cache Go build artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('mise.lock', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-build-${{ hashFiles('mise.lock', 'go.sum') }}-
            ${{ runner.os }}-go-build-

      - name: Cache golangci-lint
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/golangci-lint
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('mise.lock', '.golangci.yml', 'go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-golangci-lint-${{ hashFiles('mise.lock', '.golangci.yml', 'go.sum') }}-
            ${{ runner.os }}-golangci-lint-

      - name: Cache uv downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.uv-cache.outputs.dir }}
          key: ${{ runner.os }}-uv-docs-${{ hashFiles('docs/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-docs-

      - name: Run Moon CI
        run: moon ci --summary minimal

  race:
    name: Race Detector
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Run race detector
        run: go test -count=1 -race ./...

  incus-acceptance:
    name: Incus Acceptance
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      GOTOOLCHAIN: local
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.6.14
          cache: true

      - name: Install and initialize Incus
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates incus openssl
          sudo incus admin waitready
          sudo incus admin init --minimal

      - name: Create locally trusted acceptance certificate
        run: |
          set -euo pipefail
          mkdir -p .ci-certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout .ci-certs/acceptance-key.pem \
            -out .ci-certs/acceptance.pem \
            -subj '/CN=simplestreams-s3 acceptance' \
            -addext 'subjectAltName=IP:127.0.0.1,DNS:localhost' \
            -addext 'basicConstraints=critical,CA:TRUE' \
            -addext 'keyUsage=critical,digitalSignature,keyEncipherment,keyCertSign' \
            -addext 'extendedKeyUsage=serverAuth'
          sudo cp .ci-certs/acceptance.pem /usr/local/share/ca-certificates/simplestreams-s3-acceptance.crt
          sudo update-ca-certificates
          sudo systemctl restart incus.service
          sudo incus admin waitready

      - name: Run private-S3 Incus listing and import acceptance
        env:
          SIMPLESTREAMS_S3_INCUS_ACCEPTANCE: '1'
          SIMPLESTREAMS_S3_INCUS_SUDO: '1'
          SIMPLESTREAMS_S3_INCUS_TLS_CERT: ${{ github.workspace }}/.ci-certs/acceptance.pem
          SIMPLESTREAMS_S3_INCUS_TLS_KEY: ${{ github.workspace }}/.ci-certs/acceptance-key.pem
        run: >-
          go test -count=1 -tags integration -run '^TestIncusAcceptance$'
          -timeout 10m ./internal/integration
