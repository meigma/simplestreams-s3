# Minimal, multi-arch, nonroot runtime image assembled from the locally-built
# simplestreams-s3 apk (melange.yaml) plus the Wolfi base packages. Mirrors the former
# gcr.io/distroless/static-debian12:nonroot posture (uid 65532, ca-certs, tzdata,
# no shell). The Wolfi base intentionally floats to the latest (fresh CA
# bundle/timezones, low CVE surface); the exact resolved versions are recorded in
# the per-build SBOM + provenance attestation rather than pinned in a lockfile.
contents:
  repositories:
    - https://packages.wolfi.dev/os
    - "@local ./packages"
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    # Per-arch ephemeral melange public keys are appended at build/publish time via
    # --keyring-append (filenames differ per arch; never committed).
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - tzdata
    - simplestreams-s3@local

entrypoint:
  command: /usr/bin/simplestreams-s3

# Create the nonroot user/group (uid/gid 65532) and run as it — Wolfi has no
# `nonroot` package; the user is defined here, mirroring distroless:nonroot.
accounts:
  groups:
    - groupname: nonroot
      gid: 65532
  users:
    - username: nonroot
      uid: 65532
      gid: 65532
  run-as: 65532

archs:
  - amd64
  - arm64

annotations:
  org.opencontainers.image.title: simplestreams-s3
  org.opencontainers.image.description: Incus Simple Streams publisher and private-S3 proxy
  org.opencontainers.image.source: https://github.com/meigma/simplestreams-s3
  org.opencontainers.image.version: "0.1.3" # x-release-please-version
